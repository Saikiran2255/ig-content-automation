name: Auto Post Carousel to Instagram

on:
  schedule:
    # 6 days a week (Mon-Sat) at 19:00 IST (13:30 UTC) - carousels only,
    # single-image posts retired since carousels outperform on saves/shares
    - cron: "30 13 * * 1,2,3,4,5,6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-and-post-carousel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate carousel content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-carousel-content.js

      - name: Generate carousel slide images
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-carousel-images.js

      - name: Commit generated assets to repo
        run: |
          git config user.name "ig-automation-bot"
          git config user.email "actions@github.com"
          git add assets/ state/
          git commit -m "Auto: new carousel content and slides [skip ci]" || echo "Nothing to commit"
          git push

      - name: Build jsDelivr URLs for all slides
        run: |
          CAROUSEL_DIR=$(cat state/latest-carousel-dir.txt)
          node -e "
            const fs = require('fs');
            const dir = '$CAROUSEL_DIR';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.png')).sort();
            const urls = files.map(f => \`https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/\${dir}/\${f}\`);
            fs.writeFileSync('state/carousel-image-urls.json', JSON.stringify(urls, null, 2));
            console.log(urls.join('\n'));
          "

      - name: Warm up jsDelivr cache for all slides
        run: |
          node -e "
            const urls = require('./state/carousel-image-urls.json');
            (async () => {
              for (const url of urls) {
                for (let i = 0; i < 5; i++) {
                  const res = await fetch(url);
                  console.log(url, res.status);
                  if (res.status === 200) break;
                  await new Promise(r => setTimeout(r, 10000));
                }
              }
            })();
          "

      - name: Publish carousel to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: node scripts/publish-carousel.js
