name: Auto Post to Instagram

on:
  schedule:
    # Runs at 7:30 AM and 19:00 (7 PM) IST (01:00 and 13:30 UTC)
    - cron: "0 1 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch: {} # allows manual trigger from the Actions tab for testing

permissions:
  contents: write

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate caption + headline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-content.js

      - name: Generate image
        run: node scripts/generate-image.js

      - name: Commit generated assets to repo
        run: |
          git config user.name "ig-automation-bot"
          git config user.email "actions@github.com"
          git add assets/ state/
          git commit -m "Auto: new post content and image [skip ci]" || echo "Nothing to commit"
          git push

      - name: Build raw GitHub URL for image
        run: |
          IMAGE_PATH=$(cat state/latest-image-path.txt)
          RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/${IMAGE_PATH}"
          echo "$RAW_URL" > state/raw-image-url.txt
          echo "Image will be published from: $RAW_URL"

      - name: Wait for GitHub raw CDN to catch up
        run: sleep 30

      - name: Publish to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: node scripts/publish-instagram.js
