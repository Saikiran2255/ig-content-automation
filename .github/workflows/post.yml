name: Auto Post to Instagram

on:
  workflow_dispatch: {} # Single-image posts retired in favor of carousels (higher save/share rate). Manual trigger still available.

permissions:
  contents: write

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate caption + headline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-content.js

      - name: Generate image
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-image.js

      - name: Commit generated assets to repo
        run: |
          git config user.name "ig-automation-bot"
          git config user.email "actions@github.com"
          git add assets/ state/
          git commit -m "Auto: new post content and image [skip ci]" || echo "Nothing to commit"
          git push

      - name: Build jsDelivr CDN URL for image
        run: |
          IMAGE_PATH=$(cat state/latest-image-path.txt)
          RAW_URL="https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/${IMAGE_PATH}"
          echo "$RAW_URL" > state/raw-image-url.txt
          echo "Image will be published from: $RAW_URL"

      - name: Warm up jsDelivr cache and wait for propagation
        run: |
          IMAGE_URL=$(cat state/raw-image-url.txt)
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$IMAGE_URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Image is live on jsDelivr."
              break
            fi
            sleep 15
          done

      - name: Publish to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: node scripts/publish-instagram.js
